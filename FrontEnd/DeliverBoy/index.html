<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.card{
border-radius:15px;
}

.toast-container{
position:fixed;
top:20px;
right:20px;
z-index:9999;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

</style>

</head>

<body>

<div class="container mt-5">

<h3 class="text-center mb-4">🚚 Delivery Dashboard</h3>

<!-- ORDER SEARCH -->
<div class="card p-4 shadow mb-4">

<input type="number" id="orderId" class="form-control mb-3" placeholder="Enter Order ID">

<button class="btn btn-primary w-100" onclick="getOrder()">Get Order Details</button>

</div>

<!-- ORDER DETAILS -->
<div class="card p-4 shadow" id="orderCard" style="display:none;">

<h5 class="mb-3">📦 Order Details</h5>

<p><b>Order ID:</b> <span id="oId"></span></p>
<p><b>Customer Name:</b> <span id="name"></span></p>
<p><b>Address:</b> <span id="address"></span></p>
<p><b>Phone:</b> <span id="phone"></span></p>
<p><b>Cake:</b> <span id="cake"></span></p>
<p><b>KG:</b> <span id="kg"></span></p>
<p><b>Cake Price:</b> ₹<span id="cakePrice"></span></p>
<p><b>Delivery Charge:</b> ₹<span id="dCharge"></span></p>
<p><b>Total Amount:</b> ₹<span id="amount"></span></p>
<p><b>Status:</b> <span id="status"></span></p>

<div class="d-flex gap-2 mt-3">
<!-- 
<button id="outBtn" class="btn btn-warning w-50" onclick="updateStatus('OUT_FOR_DELIVERY')"> -->
    <button id="outBtn" class="btn btn-warning w-50" onclick="updateStatus()">
🚚 Out for Delivery
</button>

<button id="delBtn" class="btn btn-success w-50" onclick="markDelivered()">
✅ Delivered
</button>

</div>

</div>

</div>

<!--  TOAST -->
<div class="toast-container">
<div id="liveToast" class="toast align-items-center text-bg-dark border-0">
<div class="d-flex">
<div class="toast-body" id="toastMsg">Message</div>
<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

let currentOrderId = null

function showToast(msg, type="dark"){
let toastEl = document.getElementById("liveToast")
toastEl.className = `toast align-items-center text-bg-${type} border-0`
document.getElementById("toastMsg").innerText = msg
let toast = new bootstrap.Toast(toastEl)
toast.show()
}

//  GET ORDER
function getOrder(){

let id = document.getElementById("orderId").value
let token = localStorage.getItem("token")

if(!id){
    showToast("Enter Order ID ❌","danger")
    return
}

if(!token){
    showToast("Login required ❌","danger")
    return
}

fetch(`https://lava-bakery-backend.onrender.com/api/orders/${id}`,{
    headers:{
        "Authorization":"Bearer " + token
    }
})
.then(res => {
    if(!res.ok) throw new Error()
    return res.json()
})
.then(data => {

    console.log("FULL DATA:", data)
    currentOrderId = data.orderId   

    document.getElementById("orderCard").style.display = "block"

    document.getElementById("oId").innerText = data.orderId || "-"
    document.getElementById("name").innerText = data.customerName || "-"
    document.getElementById("address").innerText = data.deliveryAddress || "-"
    document.getElementById("phone").innerText = data.phoneNumber || "-"
    document.getElementById("cake").innerText = data.cakeName || "-"
    document.getElementById("kg").innerText = (data.orderedKg || 0) + " KG"

    document.getElementById("cakePrice").innerText = data.cakePrice || 0
    document.getElementById("dCharge").innerText = data.deliveryCharge || 0
    document.getElementById("amount").innerText = data.totalPrice || 0

    let statusEl = document.getElementById("status")

    if(!data.status){
        statusEl.innerText = "NO STATUS"
        statusEl.style.color = "gray"
    } else {
        statusEl.innerText = data.status

        if(data.status === "DELIVERED"){
            statusEl.style.color = "green"
        } else if(data.status === "OUT_FOR_DELIVERY"){
            statusEl.style.color = "orange"
        } else {
            statusEl.style.color = "gray"
        }
    }

    //  BUTTON LOGIC
    let outBtn = document.getElementById("outBtn")
    let delBtn = document.getElementById("delBtn")

    if(data.status === "DELIVERED"){
        outBtn.disabled = true
        delBtn.disabled = true
    }
    else if(data.status === "OUT_FOR_DELIVERY"){
        outBtn.disabled = true
        delBtn.disabled = false
    }
    else{
        outBtn.disabled = false
        delBtn.disabled = false
    }

    showToast("Order Loaded ✅","success")

})
.catch(()=>{
    showToast("Order Not Found ❌","danger")
})

}
function updateStatus(){

    if(!currentOrderId){
        showToast("Load order first ❌","danger")
        return
    }

    let token = localStorage.getItem("token")
    let deliveryBoyId = localStorage.getItem("deliveryBoyId")
if(!deliveryBoyId){
    showToast("Login expired ❌","danger")
    return
}
    fetch(`https://lava-bakery-backend.onrender.com/api/delivery/out-for-delivery/${currentOrderId}/${deliveryBoyId}`,{
        method:"PUT",
        headers:{
            "Authorization":"Bearer " + token
        }
    })
    .then(res => {
        if(!res.ok) throw new Error()

        showToast("Out for Delivery 🚚","warning")
        getOrder()
    })
    .catch(()=>{
        showToast("Update failed ❌","danger")
    })
}
// DELIVERED
function markDelivered(){

    if(!currentOrderId){
        showToast("Load order first ❌","danger")
        return
    }

    let token = localStorage.getItem("token")

    fetch(`https://lava-bakery-backend.onrender.com/api/orders/${currentOrderId}/status?status=DELIVERED`,{
        method:"PUT",
        headers:{
            "Authorization":"Bearer " + token
        }
    })
    .then(res => {
        if(!res.ok) throw new Error()

        showToast("Delivered Successfully ✅","success")
        getOrder()
    })
    .catch(()=>{
        showToast("Delivery update failed ❌","danger")
    })
}
</script>

</body>
</html>
