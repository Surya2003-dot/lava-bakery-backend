<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Delivery Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
}

.card{
width:100%;
max-width:350px;
border-radius:15px;
}

</style>

</head>

<body>

<div class="card p-4 shadow">

<h3 class="text-center mb-3">🚚 Delivery Login</h3>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">

<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button class="btn btn-primary w-100" onclick="login()">Login</button>

</div>
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center text-bg-dark border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">Message</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>

function showToast(msg, type="dark"){
    let toastEl = document.getElementById("liveToast")
    toastEl.className = `toast align-items-center text-bg-${type} border-0`
    document.getElementById("toastMsg").innerText = msg
    let toast = new bootstrap.Toast(toastEl)
    toast.show()
}

function login(){

    let username = document.getElementById("username").value
    let password = document.getElementById("password").value

    if(!username || !password){
        showToast("Fill all fields ❌","danger")
        return
    }

    let data = {
        username: username,
        password: password
    }

    fetch("https://lava-bakery-backend.onrender.com/api/delivery/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => {
        if(!res.ok) throw new Error()
        return res.json()
    })
    .then(data => {
        console.log("LOGIN RESPONSE:", data)
        localStorage.setItem("token", data.token)
        localStorage.setItem("deliveryUser", username)
        localStorage.setItem("deliveryBoyId", data.id)

        showToast("Login Successful ✅","success")

        setTimeout(()=>{
            window.location.href = "delivery-dashboard.html"
        },1000)

    })
    .catch(()=>{
        showToast("Invalid credentials ❌","danger")
    })

}

</script>

</body>
</html>
