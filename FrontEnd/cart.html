<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laava Cakes - Your Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="images/laavaIcon.png">

<style>

body{
background:#f6f7fb;
}

.cart-card{
cursor:pointer;
transition:0.3s;
}

.cart-card:hover{
transform:scale(1.02);
}

</style>

</head>

<body>
   <section class="fixed-top "> 
<!--  Top Info Bar -->
<div class="top-bar py-1 bg-light border-bottom">
  <div class="container d-flex justify-content-between small">
    <div>🚚 Same Day Delivery Available</div>
    <div>📍 Delivering to Virudhachalam</div>
  </div>
</div>

<!--  Navbar -->
<nav class="navbar bg-white shadow-sm py-2">
  <div class="container d-flex justify-content-between align-items-center">
    
    <!-- Logo -->
    <a class="navbar-brand fw-bold fs-4 text-dark m-0" href="index.html"><i class="fa-solid fa-angles-left"></i>
      <span class="text-danger">Laava</span> Cakes
    </a>

    <!-- Desktop Search -->
    <div class="d-none d-lg-block w-50 position-relative">
      <input type="text" id="desktopSearch"
             class="form-control rounded-pill ps-4"
             placeholder="Search cakes, flavours..." onkeyup="handleSearch(event)">
      <i class="fa-solid fa-magnifying-glass position-absolute"
         style="top:50%; left:5px; transform:translateY(-50%);"></i>
    </div>

    <!-- Icons -->
    <div class="d-flex align-items-center gap-3">

      <!-- Mobile Search Icon -->
      <i class="fa-solid fa-magnifying-glass fs-5 d-lg-none"
         id="mobileSearchIcon"
         style="cursor:pointer;"></i>



      <a href="cart.html" class="position-relative text-dark">

<i class="fa-solid fa-cart-shopping fs-5"></i>

<span id="cartCount"
class="position-absolute top-0 start-100 translate-middle badge bg-danger rounded-pill"
style="font-size:10px;">
0
</span>

</a>
      
     
      <a href="bag.html" class="position-relative text-dark">

<i class="fa-solid fa-bag-shopping fs-5"></i>

<span id="bagCount"
class="position-absolute top-0 start-100 translate-middle badge bg-danger rounded-pill"
style="font-size:10px;">
0
</span>

</a>
     <a href="login.html"
   class="text-dark d-lg-none position-relative"
   id="mobileUserIcon">

  <i class="fa-solid fa-user fs-5"></i>

  <!-- login status badge -->
  <span id="userStatusBadge">
  </span>

</a>
<div id="userDropdown" class="user-dropdown">
  <div id="logoutBtn">Logout</div>
  <div id="cancelBtn">Cancel</div>
</div>
     <!--  Desktop Login Button -->
  <a href="login.html" id="loginBtn" class="btn btn-outline-dark btn-sm d-none d-lg-block">
    Login
  </a>

    </div>

  </div>
</nav>
<!--  Full Screen Search Overlay -->
<div id="searchOverlay" class="search-overlay">

  <div class="search-container">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="m-0">Search</h5>
      <i class="fa-solid fa-xmark fs-4"
         id="closeSearch"
         style="cursor:pointer;"></i>
    </div>

    <input type="text"
           id="searchInput"
           class="form-control form-control-lg"
           placeholder="Search cakes..."
           autocomplete="off" onkeypress="mobileSearch(event)">
<div id="suggestionsBox" class="suggestions-box"></div>
    <!--  Search History -->
    <div id="searchHistory" class="mt-3"></div>

  </div>

</div>

<!--  Mobile Search Box -->
<div class="container d-lg-none mt-2" id="mobileSearchBox" style="display:none;">
<input type="text"
id="mobileSearchInput"
class="form-control rounded-pill"
placeholder="Search cakes..."
onkeypress="mobileSearch(event)">
</div>


</section>
<!-- WhatsApp Floating Icon -->
<a href="https://wa.me/6379295869" target="_blank" class="whatsapp-float">
  <i class="fa-brands fa-whatsapp"></i>
</a>
<div class="container py-5" style="margin-top:60px;">

<h2 class="fw-bold mb-4">



<span class="text-danger">Your</span> Cart

</h2>

<div class="row g-3" id="cartItems"></div>

</div>

<script>

const API = "https://lava-bakery-backend.onrender.com/api/cart"

function checkLogin(){

let token = localStorage.getItem("token")

if(!token){

window.location.href="login.html"

return false

}

return true

}

function loadCart(){

if(!checkLogin()) return

fetch(API,{

headers:{
"Authorization":"Bearer "+localStorage.getItem("token")
}

})
.then(res=>{
    if(!res.ok){
        throw new Error("Cart fetch failed: "+res.status)
    }
    return res.text();
})
.then(text=>{
    let cart = text ? JSON.parse(text) : [];

    let container = document.getElementById("cartItems")
    container.innerHTML=""

    if(!Array.isArray(cart) || cart.length===0){

        container.innerHTML=`
        <div class="text-center mt-5">
        <h4>Your cart is empty</h4>
        <a href="index.html" class="btn btn-danger mt-3">
        Continue Shopping
        </a>
        </div>
        `
        return
    }

    cart.forEach(item=>{
        // same code continue

container.innerHTML+=`
<div class="col-6 col-md-4 col-lg-3 p-1">

<div class="mobile-product-card cart-card"
onclick="goToDetails(${item.cakeId})"
style="cursor:pointer;">

<div class="mobile-product-img">

${item.badge ? `<span class="badge-label ${item.badge === 'Hot Seller' ? 'hot-seller' : 'best-seller'}">${item.badge}</span>` : ''}

<img src="${item.image}" alt="${item.name}">

<span class="prep-time-badge">
<i class="fa-solid fa-clock"></i>
${item.preparationTimeHours} hrs
</span>

<div class="wishlist">

<button class="cart-icon-btn cart-active"
onclick="removeItem(event,${item.id})">

<i class="fa fa-shopping-cart cart-icon"></i>

</button>

</div>

</div>

<div class="p-2">

<div class="product-title">
${item.name}
</div>

<div class="price-row">

<span class="main-price">₹${item.price}</span>

<span class="old-price">₹${parseInt(item.price)+250}</span>

<span class="discount">32% OFF</span>

<span class="cake-weight">
<i class="fa-solid fa-scale-balanced"></i>
${item.weight}
</span>

</div>

<p class="cake-desc">
Delicious cake ready for delivery
</p>

<div class="rating-row">

<div>
<span class="rating-badge">${item.rating} ★</span>
<span class="review-count">${item.reviewCount} Reviews</span>
</div>

<span class="cake-shape">
<i class="fa-solid fa-shapes"></i>
${item.shapes}
</span>

</div>

<div class="d-flex gap-2 mt-2">

<button class="btn btn-outline-danger btn-sm w-50"
onclick="removeItem(event,${item.id})">
Remove
</button>

<button class="btn btn-success btn-sm w-50"
onclick="goToDetails(${item.cakeId})">
Buy Now
</button>

</div>

</div>

</div>

</div>

`

})

})
.catch(err=>{

console.log("Cart Error",err)

})

}

function removeItem(event,id){

event.stopPropagation()

fetch(API+"/"+id,{

method:"DELETE",

headers:{
"Authorization":"Bearer "+localStorage.getItem("token")
}

})
.then(()=>loadCart())

}

function goToDetails(id){

window.location.href="details.html?id="+id

}

loadCart()

</script>
<script src="js/config.js"></script>
<script src="js/script.js"></script>

</body>

</html>
