<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(135deg,#fff1f2,#ffe4e6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:'Segoe UI',sans-serif;
}

.error-box{
text-align:center;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:400px;
width:100%;
}

.error-code{
font-size:60px;
font-weight:bold;
color:#e11d48;
}

.error-msg{
font-size:18px;
margin-bottom:20px;
}

.btn-home{
background:#e11d48;
color:white;
border:none;
}

.btn-home:hover{
background:#be123c;
}
</style>

</head>

<body>

<div class="error-box">

<div class="error-code" id="errorCode">404</div>

<div class="error-msg" id="errorMsg">
Page not found 😢
</div>

<button class="btn btn-home w-100" onclick="goHome()">
Go Home
</button>

</div>

<script>

// dynamic error
let params = new URLSearchParams(window.location.search)

let code = params.get("code") || "404"
let msg = params.get("msg") || "Something went wrong"

document.getElementById("errorCode").innerText = code
document.getElementById("errorMsg").innerText = msg

function goHome(){
window.location.href="index.html"
}

</script>

</body>
</html>
