<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laava Cakes - Pickup Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{ background:#f6f6f6; }

.checkout-card{
background:white;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.product-img{
height:120px;
object-fit:contain;
}

.order-toast{
position:fixed;
top:20px;
right:20px;
display:none;
z-index:999;
}

.toast-box{
background:#28a745;
color:white;
padding:15px;
border-radius:8px;
display:flex;
gap:10px;
}

.note{
color:red;
font-size:13px;
display:none;
}
</style>

</head>

<body>

<div class="container py-5">

<h2 class="mb-4">Pickup Order</h2>

<div class="row g-4">

<!-- LEFT -->
<div class="col-md-5">
<div class="checkout-card p-3">

<h5>Order Summary</h5>

<img id="cakeImg" class="product-img">
<h6 id="cakeName"></h6>

<p id="cakeDesc"></p>
<p id="cakeprep"></p>

<p>Weight : <span id="cakeWeight"></span></p>

<hr>

<p>Cake Price : ₹<span id="cakePrice"></span></p>
<h5>Total : ₹<span id="totalPrice"></span></h5>

</div>
</div>

<!-- RIGHT -->
<div class="col-md-7">
<div class="checkout-card p-4">

<form id="checkoutForm">

<h5>Pickup Details</h5>

<input id="phone" class="form-control mb-3" placeholder="Phone Number" required>

<input id="cakeMessage" class="form-control mb-3" placeholder="Cake Message">
<p id="prepInfo" class="text-dark fw-semibold mb-1"></p>

<p id="warningMsg" style="color:red; display:none; font-size:14px;">
⚠ After 8 PM no pickup for today. Please select tomorrow.
</p>

<label>Pickup Date</label>
<input type="date" id="pickupDate" class="form-control mb-3" required>

<p id="timeNote" class="note">
⚠ Orders for today are closed after 8 PM. Select tomorrow.
</p>

<label>Pickup Slot</label>
<select id="pickupTime" class="form-control mb-3" required>
    
<option value="">Select Slot</option>
</select>
<p id="slotWarning" style="color:red; font-size:14px; display:none;">
⚠ No slots available for today. Please select tomorrow.
</p>

<button class="btn btn-danger w-100">Place Order</button>

</form>

</div>
</div>

</div>
</div>

<!-- TOAST -->
<div id="orderToast" class="order-toast">
<div class="toast-box">
✔ Order Placed Successfully
</div>
</div>
<script>

// ===== PRODUCT =====
let product = JSON.parse(localStorage.getItem("buyNowCake"))

if(product && !product.weight){
product.weight = 1
}

let cakePrice = 0

if(product){
cakePrice = product.price

document.getElementById("cakeprep").innerText =
"Preparation Time: " + product.preparationTimeHours + " hr"

document.getElementById("cakeName").innerText = product.name
document.getElementById("cakeDesc").innerText = product.description
document.getElementById("cakeWeight").innerText = product.weight + " KG"
document.getElementById("cakePrice").innerText = cakePrice
document.getElementById("cakeImg").src = product.image
document.getElementById("totalPrice").innerText = cakePrice
}

// ===== ELEMENTS =====
let dateInput = document.getElementById("pickupDate")
let prepInfo = document.getElementById("prepInfo")
let warningMsg = document.getElementById("warningMsg")
let note = document.getElementById("timeNote")
let slotWarning = document.getElementById("slotWarning")
let dropdown = document.getElementById("pickupTime")

// ===== TIME CALC =====
let now = new Date()
let today = now.toISOString().split("T")[0]

let prep = product.preparationTimeHours || 1

// ready time
let ready = new Date(now.getTime() + prep * 60 * 60 * 1000)
let readyHour = ready.getHours()
let readyMin = ready.getMinutes()

function formatTime(h, m){
let ampm = h >= 12 ? "PM" : "AM"
h = h % 12 || 12
return `${h}:${m.toString().padStart(2,"0")} ${ampm}`
}

// ===== SHOW PREP INFO =====
prepInfo.innerText =
`Preparation Time: ${prep} hr | Ready by ${formatTime(readyHour, readyMin)}`

// ===== DATE RULE =====
if(readyHour >= 20){

let tomorrow = new Date()
tomorrow.setDate(now.getDate()+1)

let minDate = tomorrow.toISOString().split("T")[0]

dateInput.min = minDate
dateInput.value = minDate

warningMsg.style.display = "block"
note.style.display = "block"

}else{

dateInput.min = today
dateInput.value = today

warningMsg.style.display = "none"
note.style.display = "none"
}

// ===== SLOT GENERATION =====
function generateSlots(){

let selectedDate = dateInput.value
dropdown.innerHTML = `<option value="">Select Slot</option>`

let startHour

if(selectedDate === today){

startHour = readyHour

if(startHour < 10) startHour = 10

// ❌ no slots
if(startHour >= 21){

dropdown.innerHTML = `<option>No slots available</option>`
dropdown.disabled = true
slotWarning.style.display = "block"

return
}else{
dropdown.disabled = false
slotWarning.style.display = "none"
}

}else{
startHour = 10
dropdown.disabled = false
slotWarning.style.display = "none"
}

// create slots
for(let i = startHour; i < 21; i += 2){

let end = i + 2
if(end > 21) break

dropdown.innerHTML += `<option>${formatTime(i,0)} - ${formatTime(end,0)}</option>`
}

}

// ===== INIT =====
generateSlots()
dateInput.addEventListener("change", generateSlots)

// ===== ORDER =====
document.getElementById("checkoutForm").addEventListener("submit", function(e){
e.preventDefault()
createOrder()
})

function createOrder(){

let token = localStorage.getItem("token")

let phone = document.getElementById("phone").value
let message = document.getElementById("cakeMessage").value
let date = dateInput.value
let time = dropdown.value

fetch(`https://lava-bakery-backend.onrender.com/api/orders/place?cakeId=${product.id}&kg=${product.weight}&phoneNumber=${phone}&paymentMethod=CASH_ON_DELIVERY&eggType=${product.type.toUpperCase()}&cakeMessage=${encodeURIComponent(message)}&deliveryDate=${date}&deliverySlot=${time}&deliveryAddress=${encodeURIComponent("SELF PICKUP")}&cakeShape=${encodeURIComponent(product.shapes)}&cakePrice=${cakePrice}&deliveryCharge=0`,{
method:"POST",
headers:{ "Authorization":"Bearer "+token }
})
.then(res=>res.json())
.then(data=>{

let orders = JSON.parse(localStorage.getItem("orders")) || []

orders.push({
cake: product.name,
date,
time,
total: cakePrice,
status:"PREPARING"
})

localStorage.setItem("orders", JSON.stringify(orders))

document.getElementById("orderToast").style.display="block"

setTimeout(()=>{
window.location.href="bag.html"
},1500)

})

}

</script>
</body>
</html>
