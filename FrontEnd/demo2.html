<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* PROMO SECTION */
.promo-section {
  background: #fff;
  padding: 50px 0;
}

.promo-inner {
  max-width: 1100px;
  margin: auto;
  padding: 0 20px;
}

.promo-heading {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.promo-heading span {
  color: #e03120;
}

/* WRAPPER */
.promo-wrapper {
  position: relative;
  padding: 0 30px;
}

/* SLIDER */
#promoSlider {
  display: flex;
  gap: 15px;
  overflow: hidden;
}

/* CARD */
.promo-card {
  flex: 0 0 calc(50% - 10px);
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  aspect-ratio: 2/1;
  cursor: pointer;
  transition: 0.3s;
}

.promo-card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.promo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* OVERLAY TEXT */
.promo-overlay {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 100%;

  display: flex;
  flex-direction: column;
  justify-content: center;

  padding: 20px;
  color: white;

  background: linear-gradient(
    to right,
    rgba(0,0,0,0.6),
    rgba(0,0,0,0.2),
    transparent
  );
}

.promo-overlay h4 {
  font-size: 20px;
  font-weight: bold;
}

.promo-overlay p {
  font-size: 13px;
  margin-top: 5px;
}

/* ARROWS */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 35px;
  height: 35px;
  border-radius: 50%;
  border: none;
  background: white;
  color: #e03120;
  cursor: pointer;
  z-index: 10;
}

.arrow-left { left: 0; }
.arrow-right { right: 0; }

.arrow:hover {
  background: #e03120;
  color: white;
}

/* DOTS */
#promoDots {
  text-align: center;
  margin-top: 15px;
}

#promoDots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #ccc;
  margin: 0 4px;
  border-radius: 50%;
  cursor: pointer;
}

#promoDots span.active {
  background: #e03120;
  width: 18px;
  border-radius: 4px;
}

/* MOBILE */
@media (max-width:768px){
  .promo-card {
    flex: 0 0 100%;
  }
}
  </style>
</head>
<body>
<!-- PROMO SECTION -->
<section class="promo-section">
  <div class="promo-inner">

    <h3 class="promo-heading">🎯 <span>Promo</span> Offers</h3>

    <div class="promo-wrapper">

      <!-- ARROWS -->
      <button class="arrow arrow-left" onclick="scrollPromo(-1)">&#10094;</button>

      <div id="promoSlider"></div>

      <button class="arrow arrow-right" onclick="scrollPromo(1)">&#10095;</button>

    </div>

    <!-- DOTS -->
    <div id="promoDots"></div>

  </div>
</section>

<div id="promoDots"></div>
scripy
</body>
</html>
