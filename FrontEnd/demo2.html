<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flavours</title>

<style>

/* ===== SECTION ===== */
.flavour-section {
  padding: 50px 16px;
  background: #faf7f5;
}

.section-inner {
  max-width: 1000px;
  margin: auto;
}

/* HEADER */
.section-header {
  text-align: center;
  margin-bottom: 25px;
}

.section-title {
  font-size: 26px;
  font-weight: 800;
}

.section-title em {
  color: #e03120;
  font-style: normal;
}

.section-sub {
  font-size: 13px;
  color: #888;
}

/* ===== GRID WRAPPER (IMPORTANT) ===== */
.grid-wrapper {
  overflow: hidden;
  transition: max-height 0.6s cubic-bezier(.22,1,.36,1);
}

/* ===== GRID ===== */
.flavour-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

/* MOBILE */
@media (max-width: 640px) {
  .flavour-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

/* ===== CARD ===== */
.flavour-card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(6px);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.05);
  transition: all 0.25s ease;
  transform: translateY(10px);
  opacity: 0;
}

/* STAGGER ANIMATION */
.flavour-card.show {
  animation: fadeUp 0.5s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* HOVER */
.flavour-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}

/* IMAGE */
.card-img-wrap {
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
}

.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: 0.4s;
}

.flavour-card:hover img {
  transform: scale(1.06);
}

/* BODY */
.card-body {
  padding: 8px;
  text-align: center;
  font-size: 12px;
  font-weight: 600;
}

/* BUTTON */
.btn-wrap {
  text-align: center;
  margin-top: 25px;
}

.view-all-btn {
  background: #e03120;
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  cursor: pointer;
  transition: 0.3s;
}

.view-all-btn:hover {
  background: #c6281a;
}

</style>
</head>

<body>

<section class="flavour-section">
  <div class="section-inner">

    <div class="section-header">
      <h2 class="section-title">Pick Your <em>Flavour</em></h2>
      <p class="section-sub">Handcrafted with love</p>
    </div>

    <!-- WRAPPER -->
    <div class="grid-wrapper" id="gridWrapper">

      <div class="flavour-grid" id="grid">

        <!-- CARDS -->
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/two.png"></div><div class="card-body">All Cakes</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/two.png"></div><div class="card-body">Fresh Cream</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/three.png"></div><div class="card-body">Chocolate</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/one.png"></div><div class="card-body">Velvet</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/five.png"></div><div class="card-body">Butter Cream</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/six.webp"></div><div class="card-body">Fruit</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/three.png"></div><div class="card-body">Black Forest</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/two.png"></div><div class="card-body">Strawberry</div></div>
        <div class="flavour-card"><div class="card-img-wrap"><img src="images/three.png"></div><div class="card-body">Lava Cake</div></div>

      </div>

    </div>

    <div class="btn-wrap">
      <button class="view-all-btn" onclick="toggleGrid()" id="btn">
        View All Flavours
      </button>
    </div>

  </div>
</section>

<script>

let expanded = false;

function setInitialHeight() {
  const wrapper = document.getElementById("gridWrapper");
  const grid = document.getElementById("grid");

  const firstRowHeight = grid.children[0].offsetHeight + 12; // gap
  wrapper.style.maxHeight = firstRowHeight + "px";
}

function showCards() {
  document.querySelectorAll('.flavour-card').forEach((card, i) => {
    setTimeout(() => card.classList.add('show'), i * 60);
  });
}

function toggleGrid() {
  const wrapper = document.getElementById("gridWrapper");
  const grid = document.getElementById("grid");
  expanded = !expanded;

  if (expanded) {
    wrapper.style.maxHeight = grid.scrollHeight + "px";
    document.getElementById("btn").innerText = "Show Less";
  } else {
    setInitialHeight();
    document.getElementById("btn").innerText = "View All Flavours";
  }
}

window.onload = () => {
  setInitialHeight();
  showCards();
};

window.onresize = setInitialHeight;

</script>

</body>
</html>
