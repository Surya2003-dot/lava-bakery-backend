
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>laava Cakes - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="icon" href="images/laavaIcon.png">

<style>

body{
background:linear-gradient(135deg,#fff1f2,#ffe4e6);
font-family:'Segoe UI',sans-serif;
}

.register-card{
border:none;
border-radius:15px;
}

.bakery-title{
font-weight:700;
color:#e11d48;
}

.form-control:focus{
border-color:#e11d48;
box-shadow:none;
}

.register-btn{
background:#e11d48;
border:none;
}

.register-btn:hover{
background:#be123c;
}

</style>

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card shadow register-card p-4" style="width:400px">

<h4 class="text-center bakery-title mb-3">🍰 laava Cakes Register</h4>

<!-- REGISTER SUCCESS -->
<div id="registerSuccess"
style="display:none;background:#16a34a;color:white;
padding:8px;border-radius:6px;font-size:14px;
text-align:center;margin-bottom:10px;">

✔ Account Created Successfully

</div>

<!-- NAME -->
<input id="name" class="form-control mb-2" placeholder="Name">

<!-- EMAIL -->
<input id="email" type="email" class="form-control mb-2" placeholder="Email">
<div id="emailError" style="display:none;color:red;font-size:14px;">
Please enter email
</div>
<div id="emailExistError" style="display:none;color:red;font-size:14px;">
Email already registered
</div>
<!-- SEND OTP -->
<button 
id="registerOtpBtn"
class="btn btn-primary w-100 mb-2"
onclick="sendOtp()">

Send OTP

</button>

<!-- OTP SUCCESS -->
<div id="otpSuccess" style="display:none;color:green;font-size:14px;">
<i class="fa fa-check-circle"></i> OTP Sent Successfully
</div>

<!-- OTP -->
<input id="otp" class="form-control mt-2 mb-1" placeholder="Enter OTP">

<!-- OTP ERROR -->
<div id="otpError" style="display:none;color:red;font-size:14px;">
<i class="fa fa-times-circle"></i> Invalid OTP
</div>

<!-- PASSWORD -->
<div class="input-group mt-2 mb-2">

<input type="password" id="password" class="form-control"
placeholder="Create Password">


</div>

<!-- PASSWORD ERROR -->
<div id="passwordError" style="display:none;color:red;font-size:14px;">
Password must contain minimum 6 characters
</div>

<!-- REGISTER BUTTON -->
<button class="btn register-btn text-white w-100 mt-2"
onclick="register()">

Create Account

</button>

<p class="text-center mt-3">
Already have account?
<a href="login.html">Login</a>
</p>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/script.js"></script>

</body>
</html>
