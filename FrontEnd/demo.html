<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Cakes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #fdf9f7;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}

/* ===== HERO ===== */
.hero-section {
  width: 100%;
  position: relative;
  overflow: hidden;
}

.hero-animate {
  opacity: 0;
  transform: translateY(40px) scale(0.97);
  animation: heroEnter 1s cubic-bezier(.22,1,.36,1) forwards;
}

@keyframes heroEnter {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.hero-img {
  width: 100%;
  height: auto;
  max-height: 90vh;
  object-fit: cover;
  display: block;
  cursor: pointer;
  transition: transform 0.5s ease;
}

.hero-img:hover { transform: scale(1.015); }

/* ===== PROMO SECTION ===== */
.promo-section {
  background: #fff;
  padding: 40px 0 52px;
  border-top: 1px solid rgba(0,0,0,0.05);
  width: 100%;
}

/*
  Header: title + arrows
  Padded and centred with max-width — stays readable on all sizes
*/
.promo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
  padding: 0 16px;
  max-width: 1400px;
  margin-left: auto;
  margin-right: auto;
}

.promo-heading {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  color: #1a1009;
  margin: 0;
  flex: 1;
}

.promo-heading span {
  color: #e03120;
  font-style: italic;
}

/* Arrows — top-right inline with heading */
/* .arrow-group {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
} */

.arrow {
  width: 36px;
  height: 36px;
  background: #fff;
  border: 1.5px solid rgba(224,49,32,0.25);
  border-radius: 50%;
  color: #e03120;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.25s, box-shadow 0.25s, color 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  user-select: none;
}

.arrow:hover {
  background: #e03120;
  color: #fff;
  box-shadow: 0 4px 14px rgba(224,49,32,0.3);
}

/*
  Track: TRUE full viewport width — no max-width, no padding.
  overflow:hidden clips the off-screen cards.
*/
.promo-track-wrapper {
  width: 100vw;
  overflow: hidden;
}

/* Flex container moved by JS transform */
#promoSlider {
  display: flex;
  gap: 12px;
  will-change: transform;
}

/*
  ─── CARD SIZING (key fix) ───────────────────────────────────────
  Mobile  < 640px  → 1 card  = 100vw         aspect 16/7
  Tablet  640–1023 → 2 cards = ~50vw each    aspect 16/6
  Desktop ≥ 1024px → 2 cards = ~50vw each    aspect 16/6
  
  Using vw units means cards always fill the viewport regardless
  of any parent max-width constraint. Gap is 12px so each card
  in a 2-up view = (100vw - 12px) / 2.
  ─────────────────────────────────────────────────────────────────
*/
.promo-card {
  flex: 0 0 100vw;
  height: auto;
  aspect-ratio: 1200 / 450; /* exact banner ratio */
  border-radius: 12px;
  overflow: hidden;
  background: #fff; /* important for contain spacing */
  display: flex;
  align-items: center;
  justify-content: center;
}


@media (min-width: 640px) {
  .promo-card {
    flex: 0 0 calc((100vw - 12px) / 2);
  }
}
@media (min-width: 1024px) {
  .promo-card {
    flex: 0 0 calc((100vw - 12px) / 2);
    aspect-ratio: 16 / 6;
    border-radius: 16px;
  }
}

.promo-card:hover {
  transform: translateY(-5px) scale(1.012);
  box-shadow: 0 16px 36px rgba(0,0,0,0.12);
}

.promo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;   /* 🔥 MAIN FIX (no crop) */
  object-position: center;
}

/* Dots */
#promoDots {
  text-align: center;
  margin-top: 16px;
}

#promoDots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  margin: 0 4px;
  background: #ddd;
  border-radius: 50%;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s, width 0.3s;
}

#promoDots span.active {
  background: #e03120;
  transform: scale(1.3);
  width: 18px;
  border-radius: 3px;
}
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<section class="hero-section">
  <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3500">
    <div class="carousel-inner hero-animate" id="heroCarouselInner"></div>
  </div>
</section>

<!-- ===== PROMO SLIDER ===== -->
<section class="promo-section">

  <!-- Title + Arrows — padded header row -->
  <div class="promo-header">
    <h3 class="promo-heading">🎯 <span>Promo</span> Offers</h3>
    <div class="arrow-group">
      <button class="arrow" onclick="scrollPromo(-1)" aria-label="Previous">&#10094;</button>
      <button class="arrow" onclick="scrollPromo(1)"  aria-label="Next">&#10095;</button>
    </div>
  </div>

  <!-- 100vw track — no padding, full bleed -->
  <div class="promo-track-wrapper">
    <div id="promoSlider"></div>
  </div>

  <div id="promoDots"></div>

</section>

<!-- ===== SCRIPTS ===== -->
<script>
const BASE = "https://lava-bakery-backend.onrender.com/api/banner-images";

/* ---- HERO ---- */
fetch(BASE + "/hero")
  .then(r => r.json())
  .then(data => {
    const wrap = document.getElementById("heroCarouselInner");
    wrap.innerHTML = data.map((b, i) => `
      <div class="carousel-item ${i === 0 ? "active" : ""}">
        <img src="${b.imageUrl}" class="hero-img" onclick="goTo('${b.link}')">
      </div>
    `).join("");
  });

/* ---- PROMO SLIDER ---- */
let realData   = [];
let currentIdx = 0;
let autoTimer  = null;

function getPerView() {
  return window.innerWidth >= 640 ? 2 : 1;
}

function totalPages() {
  return Math.ceil(realData.length / getPerView());
}

function buildSlider(data) {
  realData   = data;
  currentIdx = 0;

  const slider = document.getElementById("promoSlider");
  slider.style.transition = "none";
  slider.style.transform  = "translateX(0)";

  slider.innerHTML = data.map(p => `
    <div class="promo-card">
      <img src="${p.imageUrl}" class="promo-img" onclick="goTo('${p.link}')">
    </div>
  `).join("");

  rebuildDots();
}

function rebuildDots() {
  const dots  = document.getElementById("promoDots");
  const total = totalPages();
  dots.innerHTML = "";
  for (let i = 0; i < total; i++) {
    dots.innerHTML += `<span onclick="dotClick(${i})"></span>`;
  }
  updateDots();
}

function applyTransform(animate) {
  const slider = document.getElementById("promoSlider");
  const cards  = slider.querySelectorAll(".promo-card");
  if (!cards.length) return;

  const gap       = 12;                        /* must match CSS gap */
  const cardWidth = cards[0].offsetWidth;      /* vw-based, always correct */
  const perView   = getPerView();
  const shift     = currentIdx * perView * (cardWidth + gap);

  slider.style.transition = animate
    ? "transform 0.45s cubic-bezier(.22,1,.36,1)"
    : "none";
  slider.style.transform = `translateX(-${shift}px)`;
}

function scrollPromo(dir) {
  currentIdx = (currentIdx + dir + totalPages()) % totalPages();
  applyTransform(true);
  updateDots();
  resetAutoScroll();
}

function dotClick(i) {
  currentIdx = i;
  applyTransform(true);
  updateDots();
  resetAutoScroll();
}

function updateDots() {
  document.querySelectorAll("#promoDots span").forEach((d, i) =>
    d.classList.toggle("active", i === currentIdx)
  );
}

function startAutoScroll() {
  autoTimer = setInterval(() => scrollPromo(1), 3000);
}

function resetAutoScroll() {
  clearInterval(autoTimer);
  startAutoScroll();
}

/* Fetch & init */
fetch(BASE + "/promo")
  .then(r => r.json())
  .then(data => {
    buildSlider(data);
    requestAnimationFrame(() => {
      applyTransform(false);
      startAutoScroll();
    });
  });

function goTo(link) {
  if (link) window.location.href = link;
}

/* Resize handler */
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!realData.length) return;
    currentIdx = 0;
    rebuildDots();
    requestAnimationFrame(() => applyTransform(false));
  }, 150);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
