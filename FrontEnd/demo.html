<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lava Cakes - Banners</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
  background:#f8f9fa;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== HERO ===== */
.hero-section{
  width:100%;
  padding:0;
  /* background:#f8f9fa; same as page */
}

.hero-animate{
  opacity: 0;
  transform: translateY(50px) scale(0.95);
  animation: heroEnter 1.2s ease forwards;
}

@keyframes heroEnter{
  to{ opacity:1; transform: translateY(0) scale(1);}
}

.hero-img{
  width:100%;
  height:auto;         
  max-height:90vh;      
  object-fit:contain;   
  display:block;
  margin:auto;
  cursor:pointer;
  transition:transform 0.4s ease;
}

.hero-img:hover{ transform: scale(1.02); }
/* @media(max-width:768px){
  .hero-img{
    max-height:300px; 
  }
} */
/* ===== PROMO SLIDER ===== */

.promo-wrapper{
  position:relative;
}

#promoSlider{
  display:flex;
  gap:20px;
  overflow-x:auto;
  scroll-behavior:smooth;
}

#promoSlider::-webkit-scrollbar{
  display:none;
}

.promo-card{
  flex:0 0 50%;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.promo-card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.promo-img{
  width:100%;
  height:220px;
  object-fit:cover;
  cursor:pointer;
}

/* arrows */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#000;
  color:#fff;
  border:none;
  padding:10px 15px;
  border-radius:50%;
  z-index:10;
}

.arrow-left{ left:-10px; }
.arrow-right{ right:-10px; }

/* ===== RESPONSIVE ===== */

@media(max-width:768px){
  .hero-img{
    width:100%;
    height:auto;
    max-height:none;  
  }
  .promo-card{ flex:0 0 100%; }
}
#promoDots span{
  display:inline-block;
  width:6px;        
  height:6px;
  margin:4px;
  background:#ddd;    
  border-radius:50%;
  cursor:pointer;
  transition:0.3s;
}

#promoDots span.active{
  background:#ff0000; 
  transform:scale(1.5);
}


</style>
</head>

<body>

<!-- HERO -->
<section class="hero-section">
  

    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
      <div class="carousel-inner hero-animate" id="heroCarouselInner"></div>
    </div>

 
</section>

<!-- PROMO SLIDER -->
<section class="container pb-5">

<h4 class="mb-3">🎯 Promo Offers</h4>

<div class="promo-wrapper">

<button class="arrow arrow-left" onclick="scrollPromo(-1)">❮</button>

<div id="promoSlider"></div>
<div class="text-center mt-3" id="promoDots"></div>
<button class="arrow arrow-right" onclick="scrollPromo(1)">❯</button>

</div>

</section>

<script>

const BASE = "https://lava-bakery-backend.onrender.com/api/banner-images";


// ===== HERO =====
fetch(BASE + "/hero")
.then(res => res.json())
.then(data => {

    let container = document.getElementById("heroCarouselInner");

    container.classList.remove("hero-animate");
    void container.offsetWidth;
    container.classList.add("hero-animate");

    container.innerHTML = "";

    data.forEach((b, index) => {
        container.innerHTML += `
        <div class="carousel-item ${index === 0 ? "active" : ""}">
            <img src="${b.imageUrl}" 
                 class="hero-img"
                 onclick="goTo('${b.link}')">
        </div>`;
    });

});


// ===== RESPONSIVE LOGIC =====
function getCardsPerView(){
  return window.innerWidth <= 768 ? 1 : 2;
}


// ===== CREATE DOTS =====
function createDots(totalCards){

  let dotsContainer = document.getElementById("promoDots");
  dotsContainer.innerHTML = "";

  let perView = getCardsPerView();
  let totalSlides = Math.ceil(totalCards / perView);

  for(let i=0; i<totalSlides; i++){
    dotsContainer.innerHTML += `<span onclick="goToSlide(${i})"></span>`;
  }
}


// ===== PROMO =====
fetch(BASE + "/promo")
.then(res => res.json())
.then(data => {

    let slider = document.getElementById("promoSlider");
    slider.innerHTML = "";

    data.forEach(p => {
        slider.innerHTML += `
        <div class="promo-card">
            <img src="${p.imageUrl}" 
                 class="promo-img"
                 onclick="goTo('${p.link}')">
        </div>`;
    });

    createDots(data.length);
    updateDots();
    startAutoScroll();

});


// ===== AUTO SCROLL =====
let scrollInterval;

function startAutoScroll(){
  scrollInterval = setInterval(()=>{
    scrollPromo(1);
  },3000);
}


// ===== SCROLL =====
function scrollPromo(direction){

  let slider = document.getElementById("promoSlider");

  slider.scrollBy({
    left: direction * slider.clientWidth,
    behavior: "smooth"
  });

  setTimeout(updateDots, 400);
}


// ===== DOT UPDATE =====
function updateDots(){

  let slider = document.getElementById("promoSlider");
  let dots = document.querySelectorAll("#promoDots span");

  let index = Math.round(slider.scrollLeft / slider.clientWidth);

  dots.forEach(d => d.classList.remove("active"));

  if(dots[index]){
    dots[index].classList.add("active");
  }
}


// ===== DOT CLICK =====
function goToSlide(index){

  let slider = document.getElementById("promoSlider");

  slider.scrollTo({
    left: index * slider.clientWidth,
    behavior: "smooth"
  });

  setTimeout(updateDots, 400);
}


// ===== SCROLL EVENT =====
document.getElementById("promoSlider").addEventListener("scroll", updateDots);


// ===== RESIZE FIX (🔥 IMPORTANT) =====
window.addEventListener("resize", () => {

  let totalCards = document.querySelectorAll(".promo-card").length;

  createDots(totalCards);
  updateDots();

});


// ===== REDIRECT =====
function goTo(link){
  if(link){
    window.location.href = link;
  }
}

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
