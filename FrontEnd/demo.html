<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lava Cakes - Banners</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
  background:#f8f9fa;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== HERO SECTION ===== */
.hero-section{
  padding: 50px 0;
}

/* LANDING ANIMATION */
.hero-animate{
  opacity: 0;
  transform: translateY(50px) scale(0.95);
  animation: heroEnter 1.2s ease forwards;
}

@keyframes heroEnter{
  to{
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/*  IMAGE ZOOM ENTRY */
.hero-img{
  width:100%;
  height:400px;
  object-fit: cover;
  border-radius:15px;
  cursor:pointer;

  animation: heroZoom 1.5s ease;
  transition: transform 0.4s ease;
}

@keyframes heroZoom{
  from{ transform: scale(1.1); }
  to{ transform: scale(1); }
}

.hero-img:hover{
  transform: scale(1.05);
}

/* ===== PROMO ===== */
.promo-card{
  border-radius:15px;
  overflow:hidden;
  transition: all 0.3s ease;
  cursor:pointer;
}

.promo-card:hover{
  transform: translateY(-10px) scale(1.03);
  box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

.promo-img{
  width:100%;
  height:200px;
  object-fit: cover;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .hero-img{
    height:250px;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero-section">
  <div class="container">

    <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
      <div class="carousel-inner hero-animate" id="heroCarouselInner"></div>
    </div>

  </div>
</section>

<!-- PROMO -->
<section class="container pb-5">
  <div class="row g-4" id="promoContainer"></div>
</section>

<script>

const BASE = "https://lava-bakery-backend.onrender.com/api/banner-images";


// ================= HERO CAROUSEL =================
fetch(BASE + "/hero")
.then(res => res.json())
.then(data => {

    let container = document.getElementById("heroCarouselInner");

    // 🔥 Re-trigger animation
    container.classList.remove("hero-animate");
    void container.offsetWidth;
    container.classList.add("hero-animate");

    container.innerHTML = "";

    data.forEach((b, index) => {

        container.innerHTML += `
        <div class="carousel-item ${index === 0 ? "active" : ""}">
            <img src="${b.imageUrl}" 
                 class="hero-img"
                 onclick="goTo('${b.link}')">
        </div>
        `;
    });

});


// ================= PROMO GRID =================
fetch(BASE + "/promo")
.then(res => res.json())
.then(data => {

    let container = document.getElementById("promoContainer");
    container.innerHTML = "";

    data.forEach(p => {

        container.innerHTML += `
        <div class="col-6 col-md-4 col-lg-3">

            <div class="promo-card">

                <img src="${p.imageUrl}" 
                     class="promo-img"
                     onclick="goTo('${p.link}')">

            </div>

        </div>
        `;
    });

});


// ================= REDIRECT =================
function goTo(link){
    if(link){
        window.location.href = link;
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
