<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Cakes - Banners</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
  background: #f8f9fa;
  font-family: 'Segoe UI', sans-serif;
}

/* ===== HERO ===== */
.hero-section {
  width: 100%;
  padding: 0;
}

.hero-animate {
  opacity: 0;
  transform: translateY(50px) scale(0.95);
  animation: heroEnter 1.2s ease forwards;
}

@keyframes heroEnter {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.hero-img {
  width: 100%;
  height: auto;
  max-height: 90vh;
  object-fit: contain;
  display: block;
  margin: auto;
  cursor: pointer;
  transition: transform 0.4s ease;
}

.hero-img:hover { transform: scale(1.02); }

/* ===== PROMO SLIDER ===== */
.promo-wrapper {
  position: relative;
  padding: 0 30px;
}

#promoSlider {
  display: flex;
  gap: 20px;
  overflow-x: hidden;       /* FIX: hide overflow — manual scroll control only */
  scroll-behavior: auto;    /* FIX: controlled per action, not globally */
}

.promo-card {
  flex: 0 0 calc(50% - 10px);  /* FIX: accounts for the 20px gap */
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
  aspect-ratio: 2 / 1;
  cursor: pointer;
}

.promo-card:hover {
  transform: translateY(-10px) scale(1.03);
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
}

.promo-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 15px;
}

/* ===== ARROWS ===== */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  /* background: red; */
  color:red;
  border: none;
  /* padding: 10px 15px; */
  /* border-radius: 50%; */
  z-index: 10;
  cursor: pointer;
}

.arrow-left  { left: -5px; }
.arrow-right { right: -5px; }

/* ===== DOTS ===== */
#promoDots {
  text-align: center;
  margin-top: 12px;
}

#promoDots span {
  display: inline-block;
  width: 6px;
  height: 6px;
  margin: 4px;
  background: #ddd;
  border-radius: 50%;
  cursor: pointer;
  transition: 0.3s;
}

#promoDots span.active {
  background: #ff0000;
  transform: scale(1.5);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .hero-img {
    width: 100%;
    height: auto;
    max-height: none;
  }
  .promo-card {
    flex: 0 0 100%;
  }
}

</style>
</head>

<body>

<!-- ===== HERO ===== -->
<section class="hero-section">
  <div id="heroCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
    <div class="carousel-inner hero-animate" id="heroCarouselInner"></div>
  </div>
</section>

<!-- ===== PROMO SLIDER ===== -->
<section class="container pb-5 pt-4">

  <h4 class="mb-3">🎯 Promo Offers</h4>

  <div class="promo-wrapper">
    <button class="arrow arrow-left"  onclick="scrollPromo(-1)">&#10094;</button>
    <div id="promoSlider"></div>
    <button class="arrow arrow-right" onclick="scrollPromo(1)">&#10095;</button>
  </div>

  <div class="text-center mt-3" id="promoDots"></div>

</section>

<script>

const BASE = "https://lava-bakery-backend.onrender.com/api/banner-images";

/* =========================================================
   HERO CAROUSEL
   ========================================================= */
fetch(BASE + "/hero")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("heroCarouselInner");

    container.classList.remove("hero-animate");
    void container.offsetWidth;               // reflow to restart animation
    container.classList.add("hero-animate");

    container.innerHTML = data.map((b, i) => `
      <div class="carousel-item ${i === 0 ? "active" : ""}">
        <img src="${b.imageUrl}" class="hero-img" onclick="goTo('${b.link}')">
      </div>
    `).join("");
  });


/* =========================================================
   PROMO SLIDER  —  FULLY FIXED
   =========================================================

   FIXES APPLIED:
   1. Removed duplicate startAutoScroll() definition.
   2. jumpTo() adds +perView offset so clones are skipped correctly.
   3. dotClick() uses scrollToIndex() (respects clone offset) not raw scrollTo().
   4. buildSlider() passes real data.length to dot creation, not cloned count.
   5. checkBoundary() uses an isTransitioning guard to prevent scroll-fight jitter.
   6. scroll-behavior toggled per action (smooth vs auto), not set globally.
   7. getSlideWidth() measures actual card width + gap for pixel-perfect scrolling.
   ========================================================= */

let realData        = [];   // original items from API
let currentIndex    = 0;    // active real-data slide index (0-based)
let isTransitioning = false; // guard: blocks boundary fix during smooth scroll
let autoTimer       = null;

/* --- helpers --- */
function getPerView() {
  return window.innerWidth <= 768 ? 1 : 2;
}

function getTotalSlides() {
  return Math.ceil(realData.length / getPerView());
}

/* width of one full "slide step" = perView cards + their gaps */
function getSlideWidth() {
  const slider  = document.getElementById("promoSlider");
  const card    = slider.querySelector(".promo-card");
  if (!card) return slider.clientWidth;
  const gap     = 20;
  return (card.offsetWidth + gap) * getPerView();
}

/* --- build slider DOM from data array --- */
function buildSlider(data) {
  realData = data;

  const slider      = document.getElementById("promoSlider");
  const dotsEl      = document.getElementById("promoDots");
  const perView     = getPerView();
  const totalSlides = getTotalSlides();

  /* Infinite clone pattern:
     [ last perView items (start-clone) ] + [ real items ] + [ first perView items (end-clone) ] */
  const cloned = [
    ...data.slice(-perView),
    ...data,
    ...data.slice(0, perView)
  ];

  slider.innerHTML = cloned.map(p => `
    <div class="promo-card">
      <img src="${p.imageUrl}" class="promo-img" onclick="goTo('${p.link}')">
    </div>
  `).join("");

  /* FIX 4: dots count based on real items, not cloned */
  dotsEl.innerHTML = "";
  for (let i = 0; i < totalSlides; i++) {
    dotsEl.innerHTML += `<span onclick="dotClick(${i})"></span>`;
  }

  currentIndex = 0;
  setTimeout(() => jumpTo(0, false), 60); // silent jump past start-clones
  updateDots();
}

/* --- instant (no animation) jump to a real-data index --- */
function jumpTo(idx, animated) {
  const slider  = document.getElementById("promoSlider");
  const perView = getPerView();
  const slideW  = getSlideWidth();

  /* FIX 2: +perView skips the start-clone block */
  const target = (idx + perView) * slideW;

  /* FIX 6: toggle scroll-behavior per action */
  slider.style.scrollBehavior = animated ? "smooth" : "auto";
  slider.scrollLeft = target;

  currentIndex = idx;
  updateDots();
}

/* --- smooth scroll to a real-data index (wraps via clone trick) --- */
function scrollToIndex(idx) {
  if (isTransitioning) return;

  const totalSlides = getTotalSlides();
  idx = ((idx % totalSlides) + totalSlides) % totalSlides; // normalise

  isTransitioning = true;
  jumpTo(idx, true);

  /* FIX 5: release guard after animation finishes */
  setTimeout(() => {
    isTransitioning = false;
  }, 420);
}

/* --- silently reset scroll position when entering clone zone --- */
function checkBoundary() {
  if (isTransitioning) return; /* FIX 5: no fighting during animation */

  const slider      = document.getElementById("promoSlider");
  const perView     = getPerView();
  const slideW      = getSlideWidth();
  const totalSlides = getTotalSlides();

  const realStart = perView * slideW;                  // scrollLeft of real slide 0
  const realEnd   = (perView + totalSlides) * slideW;  // scrollLeft after last real slide

  if (slider.scrollLeft < realStart - 2) {
    /* in start-clone zone → jump to last real slide */
    slider.style.scrollBehavior = "auto";
    slider.scrollLeft = realEnd - slideW;
    currentIndex = totalSlides - 1;
    updateDots();
  } else if (slider.scrollLeft >= realEnd - 2) {
    /* in end-clone zone → jump to first real slide */
    slider.style.scrollBehavior = "auto";
    slider.scrollLeft = realStart;
    currentIndex = 0;
    updateDots();
  }
}

/* --- sync dots to currentIndex --- */
function updateDots() {
  document.querySelectorAll("#promoDots span").forEach((dot, i) => {
    dot.classList.toggle("active", i === currentIndex);
  });
}

/* --- public: arrow buttons --- */
function scrollPromo(direction) {
  resetAutoScroll();
  scrollToIndex(currentIndex + direction);
}

/* --- public: dot click (FIX 3: uses scrollToIndex, not raw scrollTo) --- */
function dotClick(idx) {
  resetAutoScroll();
  scrollToIndex(idx);
}

/* --- FIX 1: single startAutoScroll definition --- */
function startAutoScroll() {
  autoTimer = setInterval(() => scrollToIndex(currentIndex + 1), 3000);
}

function resetAutoScroll() {
  clearInterval(autoTimer);
  startAutoScroll();
}

/* scroll event: boundary detection ONLY — no index/dot calc here */
document.getElementById("promoSlider").addEventListener("scroll", checkBoundary);

/* rebuild on resize */
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (realData.length) buildSlider(realData);
  }, 200);
});

/* fetch & init */
fetch(BASE + "/promo")
  .then(res => res.json())
  .then(data => {
    buildSlider(data);
    startAutoScroll();
  });


/* =========================================================
   UTILITY
   ========================================================= */
function goTo(link) {
  if (link) window.location.href = link;
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
