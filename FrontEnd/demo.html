<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Cakes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #fdf9f7;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}


/* ===== PROMO SECTION ===== */
.promo-section {
  /* background: #fff; */
  padding: 40px 0 52px;
  border-top: 1px solid rgba(0,0,0,0.05);
  width: 100%;
}


.promo-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
  padding: 0 16px;
  max-width: 1400px;
  margin-left: auto;
  margin-right: auto;
}
.promo-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 18px;
}
.promo-heading {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 4vw, 28px);
  font-weight: 700;
  color: #1a1009;
  margin: 0;
  flex: 1;
}

.promo-heading span {
  color: #e03120;
  font-style: italic;
}


.arrow {
  width: 38px;
  height: 38px;
  background: #fff;
  border: 1.5px solid rgba(224,49,32,0.25);
  border-radius: 50%;
  color: #e03120;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: background 0.25s, box-shadow 0.25s, color 0.25s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  user-select: none;
}

.arrow:hover {
  background: #e03120;
  color: #fff;
    transform: scale(1.1);
  box-shadow: 0 4px 14px rgba(224,49,32,0.3);
}

.promo-track-wrapper {
  width: 100vw;
  overflow: hidden;
}

/* Flex container moved by JS transform */
#promoSlider {
  display: flex;
  gap: 12px;
  will-change: transform;
}

.promo-card {
  flex: 0 0 100vw;
  height: auto;
  aspect-ratio: 1200 / 450; /* exact banner ratio */
  border-radius: 12px;
  overflow: hidden;
  background: #fff; /* important for contain spacing */
  display: flex;
  align-items: center;
  justify-content: center;
}


@media (min-width: 640px) {
  .promo-card {
    flex: 0 0 calc((100vw - 12px) / 2);
  }
}
@media (min-width: 1024px) {
  .promo-card {
    flex: 0 0 calc((100vw - 12px) / 2);
    /* aspect-ratio: 16 / 6; */
    border-radius: 16px;
  }
}

.promo-card:hover {
  transform: translateY(-5px) scale(1.012);
  box-shadow: 0 16px 36px rgba(0,0,0,0.12);
}

.promo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;   /* 🔥 MAIN FIX (no crop) */
  object-position: center;
}

/* Dots */
#promoDots {
  display: flex;
  align-items: center;
  gap: 6px;
}

#promoDots span {
  width: 6px;
  height: 6px;
  background: #ddd;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.3s ease;
}

#promoDots span.active {
  width: 20px;
  height: 6px;
  border-radius: 10px;
  background: #e03120;
}
</style>
</head>
<body>


<!-- ===== PROMO SLIDER ===== -->
<section class="promo-section">

  <!-- Title + Arrows — padded header row -->
  <div class="promo-header">
    <h3 class="promo-heading">🎯 <span>Promo</span> Offers</h3>
  
  </div>

  <!-- 100vw track — no padding, full bleed -->
  <div class="promo-track-wrapper">
    <div id="promoSlider"></div>
  </div>
 <div class="promo-controls">
  <button class="arrow" onclick="scrollPromo(-1)">&#10094;</button>

  <div id="promoDots"></div>

  <button class="arrow" onclick="scrollPromo(1)">&#10095;</button>
</div>

</section>

<!-- ===== SCRIPTS ===== -->
<script>


/* ---- PROMO SLIDER ---- */
let realData   = [];
let currentIdx = 0;
let autoTimer  = null;

function getPerView() {
  return window.innerWidth >= 640 ? 2 : 1;
}

function totalPages() {
  return Math.ceil(realData.length / getPerView());
}

function buildSlider(data) {
  realData   = data;
  currentIdx = 0;

  const slider = document.getElementById("promoSlider");
  slider.style.transition = "none";
  slider.style.transform  = "translateX(0)";

  slider.innerHTML = data.map(p => `
    <div class="promo-card">
      <img src="${p.imageUrl}" class="promo-img" onclick="goTo('${p.link}')">
    </div>
  `).join("");

  rebuildDots();
}

function rebuildDots() {
  const dots  = document.getElementById("promoDots");
  const total = totalPages();
  dots.innerHTML = "";
  for (let i = 0; i < total; i++) {
    dots.innerHTML += `<span onclick="dotClick(${i})"></span>`;
  }
  updateDots();
}

function applyTransform(animate) {
  const slider = document.getElementById("promoSlider");
  const cards  = slider.querySelectorAll(".promo-card");
  if (!cards.length) return;

  const gap       = 12;                        /* must match CSS gap */
  const cardWidth = cards[0].offsetWidth;      /* vw-based, always correct */
  const perView   = getPerView();
  const shift     = currentIdx * perView * (cardWidth + gap);

  slider.style.transition = animate
    ? "transform 0.45s cubic-bezier(.22,1,.36,1)"
    : "none";
  slider.style.transform = `translateX(-${shift}px)`;
}

function scrollPromo(dir) {
  currentIdx = (currentIdx + dir + totalPages()) % totalPages();
  applyTransform(true);
  updateDots();
  resetAutoScroll();
}

function dotClick(i) {
  currentIdx = i;
  applyTransform(true);
  updateDots();
  resetAutoScroll();
}

function updateDots() {
  document.querySelectorAll("#promoDots span").forEach((d, i) =>
    d.classList.toggle("active", i === currentIdx)
  );
}

function startAutoScroll() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => scrollPromo(1), 3000);
}

function resetAutoScroll() {
  clearInterval(autoTimer);
  startAutoScroll();
}

/* Fetch & init */
fetch( "https://lava-bakery-backend.onrender.com/api/banner-images/promo")
  .then(r => r.json())
  .then(data => {
    buildSlider(data);
    requestAnimationFrame(() => {
      applyTransform(false);
      startAutoScroll();
    });
  });

function goTo(link) {
  if (link) window.location.href = link;
}

/* Resize handler */
let resizeTimer;
window.addEventListener("resize", () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!realData.length) return;
    currentIdx = 0;
    rebuildDots();
    requestAnimationFrame(() => applyTransform(false));
  }, 150);
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
