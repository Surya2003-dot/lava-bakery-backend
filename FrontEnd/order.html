<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>laava Cakes - Place Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" href="images/laavaIcon.png">

</head>
<body>

<div class="container py-5">
  <div class="row">

    <!-- Mobile Image (only small screens) -->
    <div class="col-12 d-lg-none mb-3">
      <img id="cakeImage"
           class="img-fluid rounded shadow"
           style="height:200px; object-fit:cover; width:100%;">
    </div>

    <!-- LEFT SIDE FORM -->
    <div class="col-12 col-lg-7">
      <h3 class="mb-4">Order Details</h3>

      <div class="mb-3">
        <label>Delivery Address</label>
        <textarea id="address" class="form-control" rows="3"></textarea>
      </div>

      <div class="mb-3">
        <label>Quantity (Kg)</label>
        <input type="number" id="kg" class="form-control" step="0.5" min="0.5">
      </div>

      <div class="mb-3">
        <label>Choose Shape</label>
        <select id="shape" class="form-select">
          <option>Round</option>
          <option>Square</option>
          <option>Heart</option>
        </select>
      </div>

      <div class="mb-3">
        <label>Upload Custom Image (Optional)</label>
        <input type="file" id="customImage" class="form-control">
      </div>

      <button class="btn btn-dark w-100" onclick="placeOrder()">Place Order</button>
    </div>

    <!-- Desktop Image (only large screens) -->
    <div class="col-lg-5 d-none d-lg-block">
      <div class="card shadow">
        <img id="cakeImageDesktop"
             class="card-img-top"
             style="height:250px; object-fit:cover;">
        <div class="card-body">
          <h5 id="cakeName"></h5>
          <p id="cakePrice"></p>
        </div>
      </div>
    </div>

  </div>
</div>
<script src="js/config.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
