<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f6f6f6;
font-family:Arial;
}
.sidebar{
width:230px;
height:100vh;
background:#111;
color:white;
position:fixed;
left:0;
top:0;
padding-top:20px;
}
.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
}
.sidebar a:hover{
background:#333;
}
.content{
margin-left:230px;
padding:20px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h4 class="text-center mb-4">Admin</h4>

<a href="index.html">Dashboard</a>
<a href="orders.html">Orders</a>
<a href="cakes.html">Cakes</a>
<a href="users.html">Users</a>
<a href="DeliveryBoy.html">Delivery Boy</a>

<a href="#" onclick="logout()">Logout</a>
</div>

<!-- CONTENT -->
<div class="content">

<h2 class="mb-3">👥 Users</h2>

<!--  SEARCH -->
<input type="text" id="search" class="form-control mb-3"
placeholder="🔍 Search by ID / Name / Email..." onkeyup="searchUsers()">

<!--  TABLE -->
<div class="card p-3 shadow-sm">

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>

</div>

</div>

<script>

const token = localStorage.getItem("adminToken")
let allUsers = []

if(!token){
alert("Login required ❌")
window.location.href = "login.html"
}

//  LOAD USERS
function loadUsers(){

fetch("https://lava-bakery-backend.onrender.com/admin/users",{
headers:{
"Authorization":"Bearer " + token
}
})
.then(res => {
if(!res.ok) throw new Error("Unauthorized")
return res.json()
})
.then(data => {

console.log("USERS:", data)

allUsers = data
renderUsers(data)

})
.catch(()=>{
alert("Failed to load users ❌")
})

}

//  RENDER
function renderUsers(users){

let html = ""

if(users.length === 0){
html = `<tr><td colspan="3">No users found ❌</td></tr>`
}else{

users.forEach(u => {

html += `
<tr>
<td>${u.id}</td>
<td>${u.name}</td>
<td>${u.email}</td>
</tr>
`

})

}

document.getElementById("userTable").innerHTML = html

}

//  SEARCH FUNCTION
function searchUsers(){

let value = document.getElementById("search").value.toLowerCase()

let filtered = allUsers.filter(u =>

String(u.id).includes(value) ||
(u.name && u.name.toLowerCase().includes(value)) ||
(u.email && u.email.toLowerCase().includes(value))

)

renderUsers(filtered)

}

//  LOGOUT
function logout(){
localStorage.removeItem("adminToken")
window.location.href = "login.html"
}

// INIT
loadUsers()

</script>

</body>
</html>
