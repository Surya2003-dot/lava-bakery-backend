<!DOCTYPE html>
<html>
<head>
<title>Admin Banner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{margin:0;font-family:Arial;background:#f6f6f6;}

.sidebar{
width:230px;height:100vh;background:#111;color:white;
position:fixed;left:0;top:0;padding-top:20px;
}
.sidebar a{display:block;color:white;padding:12px;text-decoration:none;}
.sidebar a:hover{background:#333;}

.content{margin-left:230px;padding:20px;}

.card-box{
background:#fff;padding:20px;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}
.card-box:hover{transform:scale(1.03);}

.banner-img{
width:100%;height:140px;object-fit:contain;
background:#fafafa;border-radius:10px;
}

.dragging{opacity:0.5;border:2px dashed #000;}

/* Slider */
.slider{
width:100%;height:250px;overflow:hidden;
border-radius:12px;margin-bottom:20px;
position:relative;
}
.slide{
position:absolute;width:100%;height:100%;
opacity:0;transition:1s;
}
.slide.active{opacity:1;}
.slide img{width:100%;height:100%;object-fit:cover;}
</style>
</head>

<body>

<div class="sidebar">
<h4 class="text-center">Admin</h4>
<a href="#">Dashboard</a>
<a href="#">Banners</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<div class="content">

<h4>🎯 Banner Management</h4>

<!-- 🔥 LIVE SLIDER -->
<div class="slider" id="slider"></div>

<!-- ADD -->
<div class="card-box mb-3">
<input type="file" id="image" class="form-control mb-3">
<select id="type" class="form-control mb-2">
<option value="HERO">HERO</option>
<option value="PROMO">PROMO</option>
</select>
<input type="number" id="position" class="form-control mb-2" placeholder="Position">
<button class="btn btn-success w-100" onclick="uploadBanner()">Upload Banner</button>
</div>

<h5>🔥 Hero Section (Drag & Drop)</h5>
<div class="row" id="heroSection"></div>

<h5>🎯 Promo Section</h5>
<div class="row" id="promoSection"></div>

</div>

<script>

const API = "https://lava-bakery-backend.onrender.com/api/banner-images";
let token = localStorage.getItem("adminToken");

// ===== FETCH HELPER =====
function authFetch(url, options = {}) {
return fetch(url,{
...options,
headers:{
...(options.headers||{}),
"Authorization":"Bearer "+token
}
}).then(res=>{
if(!res.ok) throw new Error(res.status);
return res.text();
}).then(t=> t?JSON.parse(t):{});
}

// ===== UPLOAD =====
function uploadBanner(){

let file = document.getElementById("image").files[0];
let type = document.getElementById("type").value;
let pos = document.getElementById("position").value || 1;

let fd = new FormData();
fd.append("image",file);
fd.append("type",type);
fd.append("position",pos);

fetch(API+"/upload",{
method:"POST",
headers:{"Authorization":"Bearer "+token},
body:fd
})
.then(()=>{
showToast("Uploaded ✅");
loadBanners();
});
}

// ===== LOAD =====
function loadBanners(){

authFetch(API).then(data=>{

let hero="",promo="",slides="";

data.sort((a,b)=>a.position-b.position);

data.forEach(b=>{

let card=`
<div class="col-md-3 mb-3 draggable" draggable="true" data-id="${b.id}">
<div class="card-box">

<img src="${b.imageUrl}" class="banner-img mb-2">

<p>Pos: ${b.position}</p>

<button class="btn btn-danger w-100"
onclick="del(${b.id})">Delete</button>

</div>
</div>
`;

if(b.type==="HERO"){
hero+=card;
slides+=`<div class="slide"><img src="${b.imageUrl}"></div>`;
}else{
promo+=card;
}

});

document.getElementById("heroSection").innerHTML=hero;
document.getElementById("promoSection").innerHTML=promo;
document.getElementById("slider").innerHTML=slides;

initDrag();
startSlider();

});
}

// ===== DRAG DROP =====
function initDrag(){

let draggables=document.querySelectorAll(".draggable");
let container=document.getElementById("heroSection");

draggables.forEach(d=>{

d.addEventListener("dragstart",()=>d.classList.add("dragging"));
d.addEventListener("dragend",()=>{
d.classList.remove("dragging");
updateOrder();
});

});

container.addEventListener("dragover",e=>{
e.preventDefault();
let dragging=document.querySelector(".dragging");
container.appendChild(dragging);
});

}

// ===== UPDATE POSITION =====
function updateOrder(){

let items=document.querySelectorAll("#heroSection .draggable");

items.forEach((el,index)=>{
let id=el.getAttribute("data-id");
authFetch(API+"/position/"+id+"?position="+(index+1),{method:"PUT"});
});

showToast("Reordered 🔄");
}

// ===== SLIDER =====
function startSlider(){

let slides=document.querySelectorAll(".slide");
let i=0;

if(slides.length===0) return;

slides[0].classList.add("active");

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);

}

// ===== DELETE =====
function del(id){
authFetch(API+"/"+id,{method:"DELETE"})
.then(()=>{
showToast("Deleted ❌");
loadBanners();
});
}

// ===== TOAST =====
function showToast(msg){
let t=document.createElement("div");
t.innerText=msg;
t.style.position="fixed";
t.style.bottom="20px";
t.style.right="20px";
t.style.background="#000";
t.style.color="#fff";
t.style.padding="10px 20px";
t.style.borderRadius="8px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

// ===== LOGOUT =====
function logout(){
localStorage.removeItem("adminToken");
location.href="login.html";
}

loadBanners();

</script>

</body>
</html>
