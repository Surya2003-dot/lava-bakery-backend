<!DOCTYPE html>
<html>
<head>

<title>Admin Banner</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

/* Sidebar */
.sidebar{
width:230px;
height:100vh;
background:#111;
color:white;
position:fixed;
left:0;
top:0;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:#333;
}

/* Content */
.content{
margin-left:230px;
padding:20px;
}

/* Card */
.card-box{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* Preview (KEEP SAME) */
.preview-container{
width:200px;
height:140px;
background:#fafafa;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border:1px solid #ddd;
}

#previewImg{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* Banner Image */
.banner-img{
width:100%;
height:140px;
object-fit:contain;
background:#fafafa;
border-radius:10px;
}

#suggestions{
position:absolute;
width:100%;
z-index:999;
}

</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
<h4 class="text-center">Admin</h4>
<a href="index.html">Dashboard</a>
<a href="orders.html">Orders</a>
<a href="cakes.html">Cakes</a>
<a href="banner.html">Banners</a>
<a href="users.html">Users</a>
<a href="#" onclick="logout()">Logout</a>
</div>

<!-- Content -->
<div class="content">

<h4>🎯 Banner Management</h4>

<!-- ADD -->
<div class="card-box mb-3">

<input type="file" id="image" class="form-control mb-3">

<div class="preview-container mb-3">
<img id="previewImg" style="display:none;">
</div>

<select id="type" class="form-control mb-2">
<option value="HERO">HERO</option>
<option value="PROMO">PROMO</option>
</select>

<input type="number" id="position" class="form-control mb-2" placeholder="Position">

<select id="flavour" class="form-control mb-2" onchange="loadFlavourCakes()">
  <option value="">Select Flavour</option>
  <option>Fresh Cream Cake</option>
  <option>Butter Cream Cake</option>
  <option>Lava Special Cake</option>
  <option>Chocolate Flavoured Cake</option>
  <option>Fruit Flavoured Cake</option>
  <option>Cheese Cake</option>
  <option>Velvet Flavoured Cake</option>
  <option>Dream Flavoured Cake</option>
</select>

<select id="cakeSelect" class="form-control mb-2" style="display:none">
  <option value="">Select Cake (Optional)</option>
</select>

<button class="btn btn-success w-100" onclick="uploadBanner()">Upload Banner</button>

</div>

<!-- HERO -->
<h5 class="mt-4"> Hero Section (1920 × 800 px)</h5>
<div class="row" id="heroSection"></div>

<!-- PROMO -->
<h5 class="mt-4">🎯 Promo Section</h5>
<div class="row" id="promoSection"></div>

</div>
<!-- ONLY JS PART CHANGED — HTML SAME -->

<script>

const API = "https://lava-bakery-backend.onrender.com/api/banner-images";
const CAKE_API = "https://lava-bakery-backend.onrender.com/api/cakes/all";

let token = localStorage.getItem("adminToken");
let cakes = [];
console.log("cakes:", cakes);

// ===== COMMON FETCH =====
function authFetch(url, options = {}) {
return fetch(url,{
...options,
headers:{
...(options.headers||{}),
"Authorization":"Bearer "+token
}
}).then(res=>{
if(!res.ok) throw new Error("API Error "+res.status);
return res.text();
}).then(t=> t?JSON.parse(t):{});
}

// ===== LOAD CAKES =====
authFetch(CAKE_API)
.then(data => {
    cakes = data;
    console.log("cakes loaded:", cakes);
})
.catch(err=> console.error("Cake load error:", err));

// ===== IMAGE PREVIEW =====
document.getElementById("image").addEventListener("change", function(){
let file = this.files[0];
if(file){
let img = document.getElementById("previewImg");
img.src = URL.createObjectURL(file);
img.style.display = "block";
}
});

// ===== UPLOAD =====
function uploadBanner(){

let file = document.getElementById("image").files[0];
let type = document.getElementById("type").value;
let pos = document.getElementById("position").value;

if(!file){
alert("Select image ❌");
return;
}

let fd = new FormData();
fd.append("image",file);
fd.append("type",type);
fd.append("position",pos||1);
let cakeId = document.getElementById("cakeSelect").value;
let flavour = document.getElementById("flavour").value;

let finalLink = "";

if(cakeId){
  finalLink = `details.html?id=${cakeId}`;
}else if(flavour){
  finalLink = `category.html?flavour=${flavour}`;
}

fd.append("link", finalLink);

fetch(API+"/upload",{
method:"POST",
headers:{"Authorization":"Bearer "+token},
body:fd
})
.then(()=>{
alert("Uploaded ✅");
loadBanners();
})
.catch(err=>{
console.error(err);
alert("Upload Failed ❌");
});
}

// ===== LOAD BANNERS =====
function loadBanners(){

authFetch(API)
.then(data=>{

let heroHTML = "";
let promoHTML = "";

data.forEach(b=>{

let card = `
<div class="col-md-3 mb-3 draggable" draggable="true" data-id="${b.id}">

<div class="card-box">

<img src="${b.imageUrl}" class="banner-img mb-2">

<p><b>Pos:</b> ${b.position}</p>
<p>${b.active ? "Active ✅":"Inactive ❌"}</p>

<input type="number" value="${b.position}"
onchange="updatePosition(${b.id},this.value)"
class="form-control mb-2">

<div class="d-flex gap-2 mb-2">

<button class="btn btn-warning w-100"
onclick="toggle(${b.id})">
${b.active ? "Deactivate" : "Activate"}
</button>

<button class="btn btn-danger w-100"
onclick="del(${b.id})">
Delete
</button>

</div>

</div>

</div>
`;

if(b.type === "HERO") heroHTML += card;
else promoHTML += card;

});

document.getElementById("heroSection").innerHTML = heroHTML;
document.getElementById("promoSection").innerHTML = promoHTML;

initDrag(); // 🔥 drag feature

})
.catch(err=>{
console.error("Banner error:", err);
});
}

// ===== DRAG DROP =====
function initDrag(){

let draggables=document.querySelectorAll(".draggable");
let container=document.getElementById("heroSection");

draggables.forEach(d=>{

d.addEventListener("dragstart",()=>d.classList.add("dragging"));
d.addEventListener("dragend",()=>{
d.classList.remove("dragging");
updateOrder();
});

});

container.addEventListener("dragover",e=>{
e.preventDefault();
let dragging=document.querySelector(".dragging");
container.appendChild(dragging);
});

}

function updateOrder(){

let items=document.querySelectorAll("#heroSection .draggable");

items.forEach((el,index)=>{
let id=el.getAttribute("data-id");
authFetch(API+"/position/"+id+"?position="+(index+1),{method:"PUT"});
});

}

// ===== ACTIONS =====
function del(id){
authFetch(API+"/"+id,{method:"DELETE"}).then(loadBanners);
}

function toggle(id){
authFetch(API+"/toggle/"+id,{method:"PUT"}).then(loadBanners);
}

function updatePosition(id,pos){
authFetch(API+"/position/"+id+"?position="+pos,{method:"PUT"}).then(loadBanners);
}

// ===== LOGOUT =====
function logout(){
localStorage.removeItem("adminToken");
window.location.href="login.html";
}

loadBanners();

// function loadFlavours(){

//   let select = document.getElementById("flavour");

//   // 🔥 get unique flavours from cakes
//   let uniqueFlavours = [...new Set(cakes.map(c => c.flavour).filter(f => f))];

//   select.innerHTML = `<option value="">Select Flavour</option>`;

//   uniqueFlavours.forEach(f => {
//     select.innerHTML += `<option value="${f}">${f}</option>`;
//   });

// }
function loadFlavourCakes(){

  let flavour = document.getElementById("flavour").value;
  let cakeSelect = document.getElementById("cakeSelect");

  if(!flavour){
    cakeSelect.style.display = "none";
    return;
  }

  // 🔥 FILTER FROM DB
  let filtered = cakes.filter(c => 
    c.flavour && c.flavour.toLowerCase().trim() === flavour.toLowerCase().trim()
  );

  // 🔥 UI HANDLE
  if(filtered.length === 0){
    cakeSelect.innerHTML = `<option>No cakes found</option>`;
  }else{
    cakeSelect.innerHTML = `<option value="">All ${flavour}</option>`;

    filtered.forEach(c => {
      cakeSelect.innerHTML += `
        <option value="${c.id}">${c.name}</option>
      `;
    });
  }

  cakeSelect.style.display = "block";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
