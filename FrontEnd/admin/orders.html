<!DOCTYPE html>
<html>
<head>

<title>Admin Orders</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

/* Sidebar */

.sidebar{
width:230px;
height:100vh;
background:#111;
color:white;
position:fixed;
left:0;
top:0;
padding-top:20px;
transition:0.3s;
}

.sidebar h4{
text-align:center;
margin-bottom:20px;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:#333;
}

/* Content */

.content{
margin-left:230px;
padding:20px;
transition:0.3s;
}

/* Topbar */

.topbar{
display:flex;
align-items:center;
margin-bottom:20px;
}

/* Hamburger */

.menu-btn{
font-size:26px;
cursor:pointer;
display:none;
margin-right:15px;
}

/* Mobile */

@media(max-width:768px){

.sidebar{
left:-230px;
z-index:1000;
}

.sidebar.active{
left:0;
}

.content{
margin-left:0;
}

.menu-btn{
display:block;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<h4>Admin</h4>

<a href="index.html">Dashboard</a>
<a href="orders.html">Orders</a>
<a href="cakes.html">Cakes</a>
<a href="users.html">Users</a>
<a href="DeliveryBoy.html">Delivery Boy</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<!-- Content -->

<div class="content">

<div class="topbar">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

<h4>Orders</h4>

</div>

<div class="table-responsive">
<!-- FILTER  -->
<div class="d-flex flex-wrap gap-2 mb-3">

<select id="dateFilter" onchange="loadOrders()">
<option value="all">All Days</option>
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="custom">Custom</option>
</select>

<input type="date" id="fromDate" style="display:none;">
<input type="date" id="toDate" style="display:none;">

<select id="statusFilter" class="form-select w-auto" onchange="loadOrders()">
<option value="all" selected>All Status</option>
<option value="PENDING">PENDING</option>
<option value="PREPARING">PREPARING</option>
<option value="OUT_FOR_DELIVERY">OUT FOR DELIVERY</option>
<option value="DELIVERED">DELIVERED</option>
<option value="COMPLETED">COMPLETED</option>
<option value="CANCELLED">CANCELLED</option>
</select>

</div>
<table class="table table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Cake</th>
<th>Kg</th>
<th>Ordered Date</th>
<th>Status</th>
<th>View</th>
<th>Update</th>
</tr>

</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

</div>

<!-- Order Details Modal -->

<div class="modal fade" id="orderModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">Order Details</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body" id="orderDetails"></div>

</div>

</div>

</div>
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg">
        Status updated
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
<script>
const token = localStorage.getItem("adminToken")

if(!token){
    window.location.href="login.html"
}

// ================= ELEMENTS =================
const fromDate = document.getElementById("fromDate")
const toDate = document.getElementById("toDate")
const dateFilter = document.getElementById("dateFilter")

// ================= LOAD ORDERS =================
function loadOrders(){

const date = document.getElementById("dateFilter").value
const status = document.getElementById("statusFilter").value

let url = `https://laava-bakery-backend.onrender.com/admin/orders?date=${date}&status=${status}`

// custom date
if(date === "custom"){

const from = fromDate.value
const to = toDate.value

if(!from || !to) return

url += `&from=${from}&to=${to}`
}

fetch(url,{
headers:{
"Authorization":"Bearer "+token
}
})
.then(res=>res.json())
.then(data=>{

console.log("Orders:", data)

let orders = data.content || data
let html = ""

orders.forEach(order=>{

html += `

<tr>

<td>${order.orderId}</td>

<td>${order.cakeName}</td>

<td>${order.orderedKg}</td>

<td>${formatDate(order.orderDate)}</td>

<td>
<span class="badge bg-primary">${order.status}</span>
</td>

<td>
<button class="btn btn-sm btn-info"
onclick='showOrder(${JSON.stringify(order)})'>
View
</button>
</td>

<td>
<select onchange="updateStatus(${order.orderId},this.value)">

<option value="">Change</option>
<option value="PREPARING">PREPARING</option>
<option value="OUT_FOR_DELIVERY">OUT FOR DELIVERY</option>
<option value="DELIVERED">DELIVERED</option>
<option value="COMPLETED">COMPLETED</option>
<option value="CANCELLED">CANCELLED</option>

</select>
</td>

</tr>

`

})

document.getElementById("ordersTable").innerHTML = html

})
.catch(err=>{
console.error("Error:", err)
})

}

// ================= SHOW ORDER =================
function showOrder(order){

let html = `
<p><b>Order ID:</b> ${order.orderId}</p>
<p><b>Cake:</b> ${order.cakeName}</p>
<p><b>Kg:</b> ${order.orderedKg}</p>
<p><b>Shape:</b> ${order.cakeShape || "-"}</p>
<p><b>Message:</b> ${order.cakeMessage || "-"}</p>
<p><b>Egg Type:</b> ${order.eggType || "-"}</p>
<p><b>Delivery Date:</b> ${order.deliveryDate}</p>
<p><b>Delivery Slot:</b> ${order.deliverySlot}</p>
<p><b>Cake Price:</b> ${order.totalPrice}</p>
<p><b>Phone:</b> ${order.phoneNumber}</p>
<p><b>Address:</b> ${order.deliveryAddress}</p>
<p><b>Payment:</b> ${order.paymentMethod}</p>
`

document.getElementById("orderDetails").innerHTML = html

let modal = new bootstrap.Modal(document.getElementById("orderModal"))
modal.show()

}

// ================= UPDATE STATUS =================
function updateStatus(orderId,status){

if(!status) return

fetch(`https://laava-bakery-backend.onrender.com/admin/orders/${orderId}/status?status=${status}`,{
method:"PUT",
headers:{
"Authorization":"Bearer "+token
}
})
.then(()=>{
showToast("✅ Status updated")

setTimeout(()=>{
    loadOrders() 
},1000)

})

}

// ================= FORMAT DATE =================
function formatDate(date){

if(!date) return "-"

let d = new Date(date)

return d.toLocaleDateString("en-IN",{
day:"2-digit",
month:"short",
year:"numeric"
}) + " " + d.toLocaleTimeString("en-IN",{
hour:"2-digit",
minute:"2-digit"
})

}

// ================= FILTER CHANGE =================
dateFilter.addEventListener("change", function(){

if(this.value === "custom"){
    fromDate.style.display = "block"
    toDate.style.display = "block"
}else{
    fromDate.style.display = "none"
    toDate.style.display = "none"
    loadOrders()
}

})

// ================= CUSTOM DATE AUTO LOAD =================
fromDate.addEventListener("change", tryLoad)
toDate.addEventListener("change", tryLoad)

function tryLoad(){
if(dateFilter.value === "custom" && fromDate.value && toDate.value){
    loadOrders()
}
}

// ================= MENU =================
function toggleMenu(){
document.getElementById("sidebar").classList.toggle("active")
}

// ================= LOGOUT =================
function logout(){
localStorage.removeItem("adminToken")
window.location.href="login.html"
}

// ================= TOAST =================
function showToast(message){
let toastEl = document.getElementById("liveToast")
document.getElementById("toastMsg").innerText = message
let toast = new bootstrap.Toast(toastEl)
toast.show()
}

// ================= INITIAL LOAD =================
loadOrders()

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
