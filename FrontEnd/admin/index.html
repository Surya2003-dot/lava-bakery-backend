<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f6f6f6;
overflow-x:hidden;
}

/* Sidebar */

.sidebar{
width:230px;
height:100vh;
background:#111;
color:white;
position:fixed;
left:0;
top:0;
padding-top:20px;
transition:0.3s;
}

.sidebar a{
display:block;
color:white;
padding:12px;
text-decoration:none;
}

.sidebar a:hover{
background:#333;
}

/* Content */

.content{
margin-left:230px;
padding:20px;
transition:0.3s;
}

/* Hamburger */

.menu-btn{
font-size:24px;
cursor:pointer;
display:none;
}

/* Cards */

.card{
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* Mobile */

@media(max-width:768px){

.sidebar{
left:-230px;
z-index: 1000;
}

.sidebar.active{
left:0;
}

.content{
margin-left:0;
}

.menu-btn{
display:block;
margin-bottom:15px;
}

}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

<h4 class="text-center mb-4">Admin</h4>

<a href="index.html">Dashboard</a>
<a href="orders.html">Orders</a>
<a href="cakes.html">Cakes</a>
<a href="users.html">Users</a>
<a href="DeliveryBoy.html">Delivery Boy</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<!-- Content -->

<div class="content">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

<div class="d-flex flex-wrap gap-2 align-items-center mb-3">

<h2 class="me-auto">Admin Dashboard</h2>

<select id="dashFilter" class="form-select w-auto">
    <option value="all">All</option>
<option value="today" selected>Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
<option value="custom">Custom</option>
</select>

<input type="date" id="dashFrom" class="form-control w-auto" style="display:none;">
<input type="date" id="dashTo" class="form-control w-auto" style="display:none;">

</div>

<div class="row g-3">

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Total Orders</h6>
<h3 id="totalOrders">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Pending</h6>
<h3 id="pending">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Preparing</h6>
<h3 id="preparing">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Completed</h6>
<h3 id="completed">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Out For Delivery</h6>
<h3 id="outForDelivery">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Delivered</h6>
<h3 id="delivered">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Cancelled</h6>
<h3 id="cancelled">0</h3>
</div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
<div class="card p-3">
<h6>Total Revenue</h6>
<h3 id="revenue">₹0</h3>
</div>
</div>

</div>

</div>
<script>
const token = localStorage.getItem("adminToken")

if(!token){
window.location.href="login.html"
}

// ================= ELEMENTS =================
const dashFilter = document.getElementById("dashFilter")
const dashFrom = document.getElementById("dashFrom")
const dashTo = document.getElementById("dashTo")

// ================= LOAD DASHBOARD =================
function loadDashboard(){
if(!token){
    window.location.href="login.html";
    return;
}
const filter = dashFilter.value

const API_BASE_URL = "https://laava-bakery-backend.onrender.com";

let url = `${API_BASE_URL}/admin/dashboard?filter=${filter}`;

// custom case
if(filter === "custom"){

const from = dashFrom.value
const to = dashTo.value

if(!from || !to) return

url += `&from=${from}&to=${to}`
}
fetch(url,{
method:"GET",
headers:{
"Authorization":"Bearer "+token,
"Content-Type":"application/json"
}
})
.then(res=>{
    if(!res.ok){
        throw new Error("Unauthorized / Forbidden");
    }
    return res.json();
})
.then(data=>{

if(!data) return;

document.getElementById("totalOrders").innerText = data.totalOrders;
document.getElementById("pending").innerText = data.pending;
document.getElementById("preparing").innerText = data.preparing;
document.getElementById("completed").innerText = data.completed;
document.getElementById("outForDelivery").innerText = data.outForDelivery;
document.getElementById("delivered").innerText = data.delivered;
document.getElementById("cancelled").innerText = data.cancelled;
document.getElementById("revenue").innerText = "₹" + data.totalRevenue;

})
.catch(err=>{
console.error("Dashboard error:", err);

});
}

// ================= FILTER CHANGE =================
dashFilter.addEventListener("change", function(){

if(this.value === "custom"){
    dashFrom.style.display = "block"
    dashTo.style.display = "block"
}else{
    dashFrom.style.display = "none"
    dashTo.style.display = "none"
    loadDashboard()
}

})

// ================= CUSTOM DATE AUTO LOAD =================
dashFrom.addEventListener("change", tryLoadDash)
dashTo.addEventListener("change", tryLoadDash)

function tryLoadDash(){
if(dashFilter.value === "custom" && dashFrom.value && dashTo.value){
    loadDashboard()
}
}

// ================= INITIAL LOAD =================
loadDashboard()

</script>
</body>
</html>
