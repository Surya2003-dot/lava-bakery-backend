<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lava Cakes - Forgot Password</title>
<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="icon" href="images/six.webp">

<style>
    body{
background:linear-gradient(135deg,#fff1f2,#ffe4e6);
font-family:'Segoe UI',sans-serif;

    }
    .form-control:focus{
box-shadow:none;
border-color:#e11d48;
}
</style>
</head>

<body class="bg-light">
  

<div class="container d-flex justify-content-center align-items-center vh-100">
   
<div class="card shadow p-4" style="width:380px">
   <div id="passwordSuccess" 
style="display:none;
background:#16a34a;
color:white;
padding:8px;
border-radius:6px;
font-size:14px;
text-align:center;
margin-bottom:10px;">

<p>✔ Password Changed Successfully</p>

</div>

<h4 class="text-center mb-4">Forgot Password</h4>

<!-- Email -->
<input 
id="email"
type="email"
class="form-control mb-3"
placeholder="Enter your email">
<div id="emailError" style="display:none;color:red;font-size:14px;">
Please enter email
</div>
<button 
id="otpBtn"
class="btn btn-warning w-100 mb-3"
onclick="sendForgotOtp()">

Send OTP

</button>
<div id="otpSuccess" style="display:none;color:green;font-size:14px;">
<i class="fa fa-check-circle"></i> OTP Sent Successfully
</div>
<!-- OTP -->
<input 
id="otp"
class="form-control mb-1"
placeholder="Enter OTP">

<div id="otpError" style="display:none;color:red;font-size:14px;">
<i class="fa fa-times-circle"></i> Invalid OTP
</div>


<div class="input-group mb-3">
    <input type="password" id="password" class="form-control" placeholder="Create New Password">
</div>
<button 
class="btn btn-dark w-100"
onclick="resetPassword()">

Reset Password

</button>

<div class="text-center mt-3">
<a href="login.html">Back to Login</a>
</div>

</div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/script.js"></script>

</body>
</html>
